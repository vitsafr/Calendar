<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Premium Liquid OS Calendar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --panel: rgba(20, 20, 22, 0.65);
      --text: #ffffff;
      --muted: #52525b;
      --accent: #8b5cf6;
      --glass-border: rgba(255, 255, 255, 0.08);
      --shadow: 0 40px 80px rgba(0,0,0,0.5);
      --mask-gradient: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
      --dimmed-text: rgba(255, 255, 255, 0.22);
    }

    [data-theme="light"] {
      --bg: #f4f5f7;
      --panel: rgba(255, 255, 255, 0.75);
      --text: #1f2937;
      --muted: #8e8e93;
      --glass-border: rgba(255, 255, 255, 0.5);
      --shadow: 0 20px 50px rgba(0,0,0,0.05);
      --dimmed-text: rgba(31, 41, 55, 0.26);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: pan-y; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      color: var(--text);
      transition: background 0.5s ease;
      overflow: hidden;
    }

    .app-card {
      width: 95%;
      max-width: 1000px;
      background: var(--panel);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
      border-radius: 40px;
      box-shadow: var(--shadow);
      padding: 50px;
      position: relative;
    }

    /* --- РЁРђРџРљРђ --- */
    .header-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 50px;
      position: relative;
    }

    .year-label {
      font-size: 24px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      width: 120px;
      transition: color 0.3s;
    }
    .year-label:hover { color: var(--text); }

    .month-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -1px;
      cursor: pointer;
      transition: opacity 0.3s;
    }

    .controls-group {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 20px;
      width: 120px;
    }

    /* РўРѕРіР» С‚РµРјС‹ */
    .theme-toggle {
      width: 44px; height: 24px;
      background: rgba(128,128,128,0.1);
      border-radius: 20px;
      position: relative; cursor: pointer;
      border: 1px solid var(--glass-border);
      flex-shrink: 0;
    }
    .toggle-knob {
      width: 16px; height: 16px;
      background: var(--accent);
      border-radius: 50%;
      position: absolute; top: 3px; transform: translateX(23px);
      transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    [data-theme="light"] .toggle-knob { transform: translateX(3px); background: var(--text); }

    /* Р‘СѓСЂРіРµСЂ */
    .burger-menu {
      display: flex; flex-direction: column; gap: 5px;
      cursor: pointer; flex-shrink: 0;
    }
    .burger-line { width: 22px; height: 2px; background: var(--text); border-radius: 2px; transition: 0.3s; }
    .burger-menu:hover .burger-line:nth-child(2) { transform: translateX(4px); }

    /* --- РљРћРќРўР•Р™РќР•Р  РЎР›РћР•Р’ РЎ Р РђРЎРўР’РћР Р•РќРР•Рњ РљР РђР•Р’ --- */
    .view-container {
      position: relative;
      width: 100%;
      min-height: clamp(300px, 62vh, 520px);
      overflow: hidden;
    }

    /* РЎР»РѕР№ */
    .layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.9);
      transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .layer.active {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    /* --- РЎР•РўРљР --- */
    .grid-header {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px; margin-bottom: 15px;
    }
    .grid-header span {
      font-size: 11px; text-transform: uppercase; font-weight: 700; color: var(--muted); text-align: center; letter-spacing: 2px;
    }

    .grid-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px; }
    .grid-months { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; height: 100%; align-content: center; }
    .grid-years { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; height: 100%; align-content: center; }

    /* РћР±С‰РёРµ СЃС‚РёР»Рё СЏС‡РµРµРє */
    .cell {
      display: flex; align-items: center; justify-content: center;
      border-radius: 16px; cursor: pointer; position: relative;
      color: var(--text); font-weight: 400;
      transition: background 0.3s, transform 0.2s;
      opacity: 1;
    }
    .cell.day {
      width: 100%;
      height: clamp(40px, 8vh, 68px);
      font-size: clamp(15px, 2.1vh, 18px);
      line-height: 1;
    }
    .cell.month {
      width: 100%;
      height: clamp(60px, 14vh, 96px);
      font-size: clamp(17px, 2.6vh, 20px);
      flex-direction: column;
      gap: 4px;
      line-height: 1.1;
    }
    .cell.year {
      width: 100%;
      height: clamp(38px, 9vh, 72px);
      font-size: clamp(15px, 2.2vh, 18px);
      line-height: 1;
    }
    
    .cell:hover:not(.dimmed) { background: rgba(128,128,128,0.08); }
    .cell.dimmed { color: var(--dimmed-text); cursor: default; pointer-events: none; }

    /* РџРѕРґРїРёСЃСЊ РЅРѕРјРµСЂР° РјРµСЃСЏС†Р° (01, 02...) */
    .month-sub { font-size: 12px; color: var(--muted); font-weight: 600; }

    /* Р­С„С„РµРєС‚ РЎРµРіРѕРґРЅСЏ */
    .cell.today { font-size: 28px; font-weight: 700; }
    .cell.today::before {
      content: ''; position: absolute; width: 50px; height: 50px;
      background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
      opacity: 0.35; z-index: -1; animation: pulse 3s infinite ease-in-out;
    }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.2; } 50% { transform: scale(1.3); opacity: 0.5; } }

    /* РђРЅРёРјР°С†РёРё СЏС‡РµРµРє */
    @keyframes itemPopIn {
      0% { opacity: 0; transform: scale(0.8) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes itemFadeOut {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.8) translateY(-10px); }
    }
    
    /* РЎРґРІРёРі РІР»РµРІРѕ/РІРїСЂР°РІРѕ РїСЂРё РїРµСЂРµР»РёСЃС‚С‹РІР°РЅРёРё РєРѕР»РµСЃРѕРј/СЃРІР°Р№РїРѕРј */
    @keyframes slideNextIn {
      0% { opacity: 0; transform: translateX(50px); }
      60% { opacity: 0.85; }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes slidePrevIn {
      0% { opacity: 0; transform: translateX(-50px); }
      60% { opacity: 0.85; }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideNextOut {
      0% { opacity: 1; transform: translateX(0); }
      40% { opacity: 0.85; }
      100% { opacity: 0; transform: translateX(-50px); }
    }
    @keyframes slidePrevOut {
      0% { opacity: 1; transform: translateX(0); }
      40% { opacity: 0.85; }
      100% { opacity: 0; transform: translateX(50px); }
    }
    @keyframes headerNextOut { 0% { opacity: 1; translate: 0 0; } 100% { opacity: 0; translate: -18px 0; } }
    @keyframes headerPrevOut { 0% { opacity: 1; translate: 0 0; } 100% { opacity: 0; translate: 18px 0; } }
    @keyframes headerNextIn { 0% { opacity: 0; translate: 18px 0; } 100% { opacity: 1; translate: 0 0; } }
    @keyframes headerPrevIn { 0% { opacity: 0; translate: -18px 0; } 100% { opacity: 1; translate: 0 0; } }

    /* --- РћРќР‘РћР Р”РРќР“ (РЎРРќРР™ РџРђР›Р•Р¦/РўРћР§РљРђ) --- */
    .onboarding-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(5px);
      z-index: 100; display: none; align-items: center; justify-content: center;
    }
    .gesture-track {
      width: 80%; max-width: 400px; height: 100px; position: relative;
    }
    .blue-dot {
      position: absolute; top: 50%; left: 0; width: 24px; height: 24px;
      background: #0a84ff; border-radius: 50%; transform: translateY(-50%);
      box-shadow: 0 0 20px #0a84ff;
    }
    /* РҐРІРѕСЃС‚ РєРѕРјРµС‚С‹ СЂРµР°Р»РёР·СѓРµРј С‡РµСЂРµР· РїСЃРµРІРґРѕСЌР»РµРјРµРЅС‚, С€РёСЂРёРЅР° РєРѕС‚РѕСЂРѕРіРѕ РјРµРЅСЏРµС‚СЃСЏ */
    .blue-dot::after {
      content: ''; position: absolute; top: 50%; right: 100%; transform: translateY(-50%);
      height: 8px; width: 0px; background: linear-gradient(to left, #0a84ff, transparent);
      border-radius: 10px; opacity: 0; transition: opacity 0.2s;
    }
    
    /* РђРЅРёРјР°С†РёСЏ: Р’РїСЂР°РІРѕ (Р±С‹СЃС‚СЂРѕ) -> Р’РїСЂР°РІРѕ (РјРµРґР»РµРЅРЅРѕ) -> Р’Р»РµРІРѕ (Р±С‹СЃС‚СЂРѕ) -> Р’Р»РµРІРѕ (РјРµРґР»РµРЅРЅРѕ) */
    .animate-gesture .blue-dot {
      animation: swipeGesture 4s ease-in-out 2; /* 2 РїРѕРІС‚РѕСЂРµРЅРёСЏ */
    }
    .animate-gesture .blue-dot::after {
      animation: tailGesture 4s ease-in-out 2;
    }

    @keyframes swipeGesture {
      0% { left: 0%; }
      15% { left: 50%; } /* РЈСЃРєРѕСЂРµРЅРЅРѕ РґРѕ СЃРµСЂРµРґРёРЅС‹ */
      50% { left: 100%; } /* Р‘РµР· РєРѕРјРµС‚С‹ РґРѕ РєСЂР°СЏ */
      65% { left: 50%; } /* РЈСЃРєРѕСЂРµРЅРЅРѕ РѕР±СЂР°С‚РЅРѕ РґРѕ СЃРµСЂРµРґРёРЅС‹ */
      100% { left: 0%; } /* РћР±СЂР°С‚РЅРѕ РІ РЅР°С‡Р°Р»Рѕ */
    }
    @keyframes tailGesture {
      0% { width: 0; opacity: 0; }
      7% { width: 60px; opacity: 0.8; } /* Р Р°Р·РіРѕРЅ РІРїСЂР°РІРѕ */
      15% { width: 0px; opacity: 0; }
      50% { width: 0; opacity: 0; right: auto; left: 100%; background: linear-gradient(to right, #0a84ff, transparent); }
      57% { width: 60px; opacity: 0.8; } /* Р Р°Р·РіРѕРЅ РІР»РµРІРѕ */
      65% { width: 0px; opacity: 0; }
      100% { width: 0; opacity: 0; right: 100%; left: auto; background: linear-gradient(to left, #0a84ff, transparent); }
    }

    /* --- РђР”РђРџРўРР’ Р”Р›РЇ РњРћР‘РР›РћРљ --- */
    @media (max-width: 600px) {
      .app-card { padding: 22px 14px; border-radius: 30px; }
      .header-controls { flex-direction: row; margin-bottom: 18px; }
      .year-label { font-size: 18px; width: 72px; }
      .view-container { min-height: clamp(320px, 92vw, 430px); }
      /* Р’С‹С‡РёСЃР»СЏРµРј Р°РґР°РїС‚РёРІРЅС‹Р№ С†РµРЅС‚СЂ РґР»СЏ РјРµСЃСЏС†Р° СЃ СѓС‡РµС‚РѕРј Р±РѕРєРѕРІС‹С… Р±Р»РѕРєРѕРІ */
      .month-title { font-size: 20px; position: static; transform: none; flex-grow: 1; text-align: center; }
      .controls-group { width: auto; gap: 12px; }
      .grid-header { gap: 8px; margin-bottom: 10px; }
      .grid-header span { font-size: 10px; letter-spacing: 1.5px; }
      .grid-days { gap: 8px; }
      .cell.day {
        width: 100%;
        height: clamp(34px, 6.8vh, 46px);
        font-size: clamp(14px, 2.2vh, 16px);
      }
      .cell.today { font-size: 20px; }
      .cell.today::before { width: 40px; height: 40px; }
      
      /* РџРµСЂРµСЃС‚СЂРѕРµРЅРёРµ СЃРµС‚РѕРє РґР»СЏ РјРѕР±РёР»РѕРє */
      .grid-months { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .cell.month {
        width: 100%;
        height: clamp(52px, 10vh, 68px);
        font-size: clamp(15px, 2.4vh, 17px);
      }
      .grid-years { grid-template-columns: repeat(3, 1fr); gap: 8px; } /* 3x5 */
      .cell.year {
        width: 100%;
        height: clamp(34px, 7.8vh, 50px);
        font-size: clamp(14px, 2.2vh, 16px);
      }
    }

    @media (max-height: 620px) {
      body {
        align-items: flex-start;
        overflow-y: auto;
        padding: 8px 0;
      }
      .view-container {
        min-height: clamp(260px, 56dvh, 420px);
      }
    }
  </style>
</head>
<body data-theme="dark">

  <div class="onboarding-overlay" id="onboarding">
    <div class="gesture-track">
      <div class="blue-dot"></div>
    </div>
  </div>

  <div class="app-card">
    <div class="header-controls">
      <div class="year-label" id="yearBtn" onclick="switchLayer('years')">2024</div>
      <div class="month-title" id="monthBtn" onclick="switchLayer('months')">Март</div>
      
      <div class="controls-group">
        <div class="theme-toggle" onclick="toggleTheme()">
          <div class="toggle-knob"></div>
        </div>
        <div class="burger-menu">
          <div class="burger-line"></div>
          <div class="burger-line"></div>
          <div class="burger-line"></div>
        </div>
      </div>
    </div>

    <div class="view-container" id="viewContainer">
      <div class="layer active" id="layer-days">
        <div class="grid-header">
          <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
        </div>
        <div class="grid-days" id="grid-days"></div>
      </div>

      <div class="layer" id="layer-months">
        <div class="grid-months" id="grid-months"></div>
      </div>

      <div class="layer" id="layer-years">
        <div class="grid-years" id="grid-years"></div>
      </div>
    </div>
  </div>

  <script>
    const monthFormatter = new Intl.DateTimeFormat('ru-RU', { month: 'long' });
    const today = new Date();
    const state = {
      currentView: 'days',
      displayYear: today.getFullYear(),
      displayMonth: today.getMonth(),
      selectedDay: today.getDate(),
    };
    let isAnimating = false;

    document.addEventListener("DOMContentLoaded", () => {
      checkOnboarding();
      renderCurrent('itemPopIn');
    });

    function toggleTheme() {
      const body = document.body;
      body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function checkOnboarding() {
      if (!localStorage.getItem('premiumCalendarOnboardingDone')) {
        const overlay = document.getElementById('onboarding');
        overlay.style.display = 'flex';
        overlay.classList.add('animate-gesture');

        setTimeout(() => {
          overlay.style.opacity = '0';
          setTimeout(() => (overlay.style.display = 'none'), 500);
          localStorage.setItem('premiumCalendarOnboardingDone', 'true');
        }, 8000);

        overlay.addEventListener('click', () => {
          overlay.style.display = 'none';
          localStorage.setItem('premiumCalendarOnboardingDone', 'true');
        });
      }
    }

    function capitalize(value) {
      return value.charAt(0).toUpperCase() + value.slice(1);
    }

    function getMonthName(monthIndex) {
      return capitalize(monthFormatter.format(new Date(2020, monthIndex, 1)));
    }

    function getDaysInMonth(year, month) {
      return new Date(year, month + 1, 0).getDate();
    }

    function getYearGridCount() {
      return window.innerWidth <= 600 ? 15 : 35;
    }

    function syncHeader() {
      document.getElementById('yearBtn').textContent = state.displayYear;
      document.getElementById('monthBtn').textContent = getMonthName(state.displayMonth);
    }

    function renderCurrent(animName = 'itemPopIn') {
      syncHeader();
      if (state.currentView === 'days') renderDays(animName);
      if (state.currentView === 'months') renderMonths(animName);
      if (state.currentView === 'years') renderYears(animName);
    }

    function activateLayer(targetView, animName = 'itemPopIn') {
      document.getElementById(`layer-${state.currentView}`).classList.remove('active');
      document.getElementById(`layer-${targetView}`).classList.add('active');
      state.currentView = targetView;
      renderCurrent(animName);
    }

    function switchLayer(targetView) {
      if (isAnimating || state.currentView === targetView) return;
      isAnimating = true;
      activateLayer(targetView, 'itemPopIn');
      setTimeout(() => {
        isAnimating = false;
      }, 260);
    }

    function getDayCellsData(year, month) {
      const firstWeekDay = (new Date(year, month, 1).getDay() + 6) % 7;
      const daysInMonth = getDaysInMonth(year, month);
      const prevMonthDays = getDaysInMonth(year, month - 1);
      const cells = [];

      for (let i = 0; i < 42; i++) {
        const dayNumber = i - firstWeekDay + 1;
        let monthShift = 0;
        let value = dayNumber;
        if (dayNumber <= 0) {
          monthShift = -1;
          value = prevMonthDays + dayNumber;
        } else if (dayNumber > daysInMonth) {
          monthShift = 1;
          value = dayNumber - daysInMonth;
        }

        const targetDate = new Date(year, month + monthShift, value);
        const isToday =
          targetDate.getFullYear() === today.getFullYear() &&
          targetDate.getMonth() === today.getMonth() &&
          targetDate.getDate() === today.getDate();
        const classes = ['cell', 'day'];
        if (monthShift !== 0) classes.push('dimmed');
        if (isToday) classes.push('today');
        cells.push({ value, monthShift, className: classes.join(' ') });
      }

      return cells;
    }

    function getMonthCellsData(year) {
      const cells = [];
      for (let i = 0; i < 12; i++) {
        const num = String(i + 1).padStart(2, '0');
        const classes = ['cell', 'month'];
        if (year === today.getFullYear() && i === today.getMonth()) classes.push('today');
        cells.push({
          monthIndex: i,
          className: classes.join(' '),
          label: getMonthName(i),
          sub: num,
        });
      }
      return cells;
    }

    function getYearCellsData(centerYear) {
      const cells = [];
      const count = getYearGridCount();
      const startYear = centerYear - Math.floor(count / 2);
      for (let i = 0; i < count; i++) {
        const year = startYear + i;
        const classes = ['cell', 'year'];
        if (year === today.getFullYear()) classes.push('today');
        cells.push({ year, className: classes.join(' ') });
      }
      return cells;
    }

    function bindDayCellClicks(grid) {
      grid.querySelectorAll('.cell.day').forEach((cell) => {
        cell.onclick = () => {
          const day = Number(cell.dataset.day);
          state.selectedDay = day;
        };
      });
    }

    function bindMonthCellClicks(grid) {
      grid.querySelectorAll('.cell.month').forEach((cell) => {
        cell.onclick = () => selectMonth(Number(cell.dataset.month));
      });
    }

    function bindYearCellClicks(grid) {
      grid.querySelectorAll('.cell.year').forEach((cell) => {
        cell.onclick = () => selectYear(Number(cell.dataset.year));
      });
    }

    function renderDays(animName) {
      const grid = document.getElementById('grid-days');
      const cellsData = getDayCellsData(state.displayYear, state.displayMonth);
      grid.innerHTML = cellsData
        .map((item) => `<div class="${item.className}" data-day="${item.value}" data-shift="${item.monthShift}">${item.value}</div>`)
        .join('');

      bindDayCellClicks(grid);
      applyStaggerAnimation(grid, animName);
    }

    function selectMonth(monthIndex) {
      if (isAnimating) return;
      const prevMonth = state.displayMonth;
      const monthChanged = monthIndex !== prevMonth;
      const direction = monthIndex > prevMonth ? 'next' : 'prev';
      const changes = { yearChanged: false, monthChanged };

      if (!monthChanged) {
        activateLayer('days', 'itemPopIn');
        return;
      }

      isAnimating = true;
      animateHeader(direction, 'out', changes);
      setTimeout(() => {
        state.displayMonth = monthIndex;
        state.selectedDay = Math.min(state.selectedDay, getDaysInMonth(state.displayYear, monthIndex));
        activateLayer('days', 'itemPopIn');
        animateHeader(direction, 'in', changes);
        setTimeout(() => {
          isAnimating = false;
        }, 300);
      }, 220);
    }

    function renderMonths(animName) {
      const grid = document.getElementById('grid-months');
      const cellsData = getMonthCellsData(state.displayYear);
      grid.innerHTML = cellsData
        .map((item) => `<div class="${item.className}" data-month="${item.monthIndex}"><span>${item.label}</span><span class="month-sub">${item.sub}</span></div>`)
        .join('');

      bindMonthCellClicks(grid);
      applyStaggerAnimation(grid, animName);
    }

    function selectYear(year) {
      if (isAnimating) return;
      const prevYear = state.displayYear;
      const yearChanged = year !== prevYear;
      const direction = year > prevYear ? 'next' : 'prev';
      const changes = { yearChanged, monthChanged: false };

      if (!yearChanged) {
        activateLayer('months', 'itemPopIn');
        return;
      }

      isAnimating = true;
      animateHeader(direction, 'out', changes);
      setTimeout(() => {
        state.displayYear = year;
        state.selectedDay = Math.min(state.selectedDay, getDaysInMonth(state.displayYear, state.displayMonth));
        activateLayer('months', 'itemPopIn');
        animateHeader(direction, 'in', changes);
        setTimeout(() => {
          isAnimating = false;
        }, 300);
      }, 220);
    }

    function renderYears(animName) {
      const grid = document.getElementById('grid-years');
      const cellsData = getYearCellsData(state.displayYear);
      grid.innerHTML = cellsData
        .map((item) => `<div class="${item.className}" data-year="${item.year}">${item.year}</div>`)
        .join('');

      bindYearCellClicks(grid);
      applyStaggerAnimation(grid, animName);
    }

    function applyStaggerAnimation(grid, animName) {
      const validAnimations = new Set(['itemPopIn', 'slideNextIn', 'slidePrevIn', 'itemFadeOut']);
      const animation = validAnimations.has(animName) ? animName : 'itemPopIn';
      const cells = grid.querySelectorAll('.cell');
      cells.forEach((cell, i) => {
        const delay = i * 15;
        cell.style.animation = 'none';
        cell.offsetHeight;
        cell.style.animation = `${animation} 0.5s cubic-bezier(0.16, 1, 0.3, 1) both ${delay}ms`;
      });
    }

    function getActiveGrid() {
      const activeLayer = document.getElementById(`layer-${state.currentView}`);
      if (!activeLayer) return null;
      return activeLayer.querySelector('.grid-days, .grid-months, .grid-years');
    }

    function animateCurrentGridOut(direction) {
      const grid = getActiveGrid();
      if (!grid) return 0;
      const cells = grid.querySelectorAll('.cell');
      const duration = 320;
      const step = 15;
      const outAnimation = direction === 'next' ? 'slideNextOut' : 'slidePrevOut';
      cells.forEach((cell, i) => {
        cell.style.animation = 'none';
        cell.offsetHeight;
        cell.style.animation = `${outAnimation} ${duration}ms cubic-bezier(0.16, 1, 0.3, 1) both ${i * step}ms`;
      });
      return duration + Math.max(0, cells.length - 1) * step;
    }

    function animateHeader(direction, phase, changes) {
      const targets = [];
      if (changes.yearChanged) targets.push(document.getElementById('yearBtn'));
      if (changes.monthChanged) targets.push(document.getElementById('monthBtn'));
      if (!targets.length) return;

      const isNext = direction === 'next';
      const animName = phase === 'out'
        ? (isNext ? 'headerNextOut' : 'headerPrevOut')
        : (isNext ? 'headerNextIn' : 'headerPrevIn');

      targets.forEach((el) => {
        if (!el) return;
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = `${animName} 260ms cubic-bezier(0.16, 1, 0.3, 1) both`;
      });
    }

    function navigateContent(direction) {
      if (isAnimating) return;
      isAnimating = true;

      const delta = direction === 'next' ? 1 : -1;
      const prevYear = state.displayYear;
      const prevMonth = state.displayMonth;
      let nextYear = prevYear;
      let nextMonth = prevMonth;
      let nextSelectedDay = state.selectedDay;

      if (state.currentView === 'days') {
        const nextMonthDate = new Date(prevYear, prevMonth + delta, 1);
        nextYear = nextMonthDate.getFullYear();
        nextMonth = nextMonthDate.getMonth();
        nextSelectedDay = Math.min(state.selectedDay, getDaysInMonth(nextYear, nextMonth));
      } else if (state.currentView === 'months') {
        nextYear = prevYear + delta;
      } else if (state.currentView === 'years') {
        nextYear = prevYear + delta * getYearGridCount();
      }

      const changes = {
        yearChanged: nextYear !== prevYear,
        monthChanged: nextMonth !== prevMonth,
      };

      if (state.currentView === 'days' || state.currentView === 'months' || state.currentView === 'years') {
        transitionGridByRows(state.currentView, direction, nextYear, nextMonth, nextSelectedDay, changes);
        return;
      }

      animateHeader(direction, 'out', changes);
      const outDuration = animateCurrentGridOut(direction);
      setTimeout(() => {
        state.displayYear = nextYear;
        state.displayMonth = nextMonth;
        state.selectedDay = nextSelectedDay;

        renderCurrent(delta > 0 ? 'slideNextIn' : 'slidePrevIn');
        animateHeader(direction, 'in', changes);
        setTimeout(() => {
          isAnimating = false;
        }, 360);
      }, outDuration);
    }

    function transitionGridByRows(view, direction, nextYear, nextMonth, nextSelectedDay, changes) {
      const gridId = view === 'days' ? 'grid-days' : view === 'months' ? 'grid-months' : 'grid-years';
      const className = view === 'days' ? '.cell.day' : view === 'months' ? '.cell.month' : '.cell.year';
      const cols = view === 'days' ? 7 : window.innerWidth <= 600 ? 3 : view === 'months' ? 4 : 7;
      const expectedCount = view === 'days' ? 42 : view === 'months' ? 12 : getYearGridCount();
      const grid = document.getElementById(gridId);
      const currentCells = Array.from(grid.querySelectorAll(className));
      if (currentCells.length !== expectedCount) {
        state.displayYear = nextYear;
        state.displayMonth = nextMonth;
        state.selectedDay = nextSelectedDay;
        renderCurrent(direction === 'next' ? 'slideNextIn' : 'slidePrevIn');
        animateHeader(direction, 'in', changes);
        isAnimating = false;
        return;
      }

      const nextCellsData = view === 'days'
        ? getDayCellsData(nextYear, nextMonth)
        : view === 'months'
          ? getMonthCellsData(nextYear)
          : getYearCellsData(nextYear);
      const outAnimation = direction === 'next' ? 'slideNextOut' : 'slidePrevOut';
      const inAnimation = direction === 'next' ? 'slideNextIn' : 'slidePrevIn';
      const rowCount = Math.ceil(expectedCount / cols);
      const rowDuration = 300;
      const inDuration = 300;
      const rowStep = 120;
      const cellStep = 15;

      animateHeader(direction, 'out', changes);

      setTimeout(() => {
        state.displayYear = nextYear;
        state.displayMonth = nextMonth;
        state.selectedDay = nextSelectedDay;
        syncHeader();
        animateHeader(direction, 'in', changes);
      }, rowDuration);

      for (let row = 0; row < rowCount; row++) {
        const rowStart = row * cols;
        const rowCells = currentCells.slice(rowStart, rowStart + cols);

        setTimeout(() => {
          rowCells.forEach((cell, col) => {
            cell.style.animation = 'none';
            cell.offsetHeight;
            cell.style.animation = `${outAnimation} ${rowDuration}ms cubic-bezier(0.16, 1, 0.3, 1) both ${col * cellStep}ms`;
            // Start "in" immediately after this cell's own "out" ends.
            setTimeout(() => {
              const nextCell = nextCellsData[rowStart + col];
              if (!nextCell) return;
              cell.className = nextCell.className;
              if (view === 'days') {
                cell.dataset.day = String(nextCell.value);
                cell.dataset.shift = String(nextCell.monthShift);
                cell.textContent = String(nextCell.value);
              } else if (view === 'months') {
                cell.dataset.month = String(nextCell.monthIndex);
                cell.innerHTML = `<span>${nextCell.label}</span><span class="month-sub">${nextCell.sub}</span>`;
              } else {
                cell.dataset.year = String(nextCell.year);
                cell.textContent = String(nextCell.year);
              }
              cell.style.animation = 'none';
              cell.offsetHeight;
              cell.style.animation = `${inAnimation} ${inDuration}ms cubic-bezier(0.16, 1, 0.3, 1) both`;
            }, rowDuration + col * cellStep);
          });
        }, row * rowStep);
      }

      const rowTail = rowDuration + (cols - 1) * cellStep + inDuration;
      const totalDuration = (rowCount - 1) * rowStep + rowTail + 80;
      setTimeout(() => {
        if (view === 'days') bindDayCellClicks(grid);
        if (view === 'months') bindMonthCellClicks(grid);
        if (view === 'years') bindYearCellClicks(grid);
        isAnimating = false;
      }, totalDuration);
    }

    const viewContainer = document.getElementById('viewContainer');
    viewContainer.addEventListener('wheel', (e) => {
      if (Math.abs(e.deltaY) > 30) {
        navigateContent(e.deltaY > 0 ? 'next' : 'prev');
      }
    }, { passive: true });

    let touchStartX = 0;
    viewContainer.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });
    viewContainer.addEventListener('touchend', (e) => {
      const touchEndX = e.changedTouches[0].screenX;
      const diff = touchStartX - touchEndX;
      if (diff > 50) navigateContent('next');
      if (diff < -50) navigateContent('prev');
    }, { passive: true });

    window.addEventListener('resize', () => {
      if (state.currentView === 'years') renderYears('itemPopIn');
    });
  </script>
</body>
</html>
