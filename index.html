<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Premium Liquid OS Calendar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --panel: rgba(20, 20, 22, 0.65);
      --text: #ffffff;
      --muted: #52525b;
      --accent: #8b5cf6;
      --current-color: #8b5cf6;
      --weekend-color: #ff5f8a;
      --workday-color: #ffffff;
      --glass-border: rgba(255, 255, 255, 0.08);
      --shadow: 0 40px 80px rgba(0,0,0,0.5);
      --mask-gradient: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
      --dimmed-text: rgba(255, 255, 255, 0.22);
      --day-cell-h: clamp(40px, 8vh, 68px);
      --day-gap: 15px;
      --dow-zone: 38px;
      --rain-color: rgba(255, 255, 255, 0.2);
    }

    [data-theme="light"] {
      --bg: #f4f5f7;
      --panel: rgba(255, 255, 255, 0.75);
      --text: #1f2937;
      --muted: #8e8e93;
      --glass-border: rgba(255, 255, 255, 0.5);
      --shadow: 0 20px 50px rgba(0,0,0,0.05);
      --dimmed-text: rgba(31, 41, 55, 0.26);
      --rain-color: rgba(31, 41, 55, 0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: pan-y; }

    html {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      width: 100%;
      color: var(--text);
      transition: background 0.5s ease;
      overflow: hidden;
    }

    body.anim-none *,
    body.anim-none *::before,
    body.anim-none *::after {
      animation: none !important;
      transition-duration: 0ms !important;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s ease;
      background-size: 64px 64px;
    }
    body::after {
      content: '';
      position: fixed;
      inset: -20% 0 0 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      background-repeat: repeat;
      transform: translateY(-20%);
    }
    body[data-bg='none']::before {
      opacity: 0;
      background-image: none;
    }
    body[data-bg='bubbles']::before {
      opacity: 0.18;
      background-image:
        radial-gradient(circle at 12% 18%, rgba(255,255,255,0.18) 0 8px, transparent 10px),
        radial-gradient(circle at 68% 28%, rgba(255,255,255,0.12) 0 12px, transparent 14px),
        radial-gradient(circle at 34% 72%, rgba(255,255,255,0.15) 0 7px, transparent 9px),
        radial-gradient(circle at 82% 76%, rgba(255,255,255,0.1) 0 10px, transparent 12px);
      background-size: 160px 160px;
    }
    body[data-bg='honeycomb']::before {
      opacity: 0.16;
      background-image:
        linear-gradient(30deg, rgba(255,255,255,0.08) 12%, transparent 12.5%, transparent 87%, rgba(255,255,255,0.08) 87.5%, rgba(255,255,255,0.08)),
        linear-gradient(150deg, rgba(255,255,255,0.08) 12%, transparent 12.5%, transparent 87%, rgba(255,255,255,0.08) 87.5%, rgba(255,255,255,0.08)),
        linear-gradient(90deg, rgba(255,255,255,0.05) 2%, transparent 2.5%, transparent 97%, rgba(255,255,255,0.05) 97.5%, rgba(255,255,255,0.05));
      background-size: 52px 90px;
      background-position: 0 0, 0 0, 26px 45px;
    }
    body[data-bg='grid']::before {
      opacity: 0.15;
      background-image:
        linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    body[data-bg='dots']::before {
      opacity: 0.2;
      background-image: radial-gradient(rgba(255,255,255,0.15) 1px, transparent 1px);
      background-size: 18px 18px;
    }
    body[data-bg='hatch']::before {
      opacity: 0.14;
      background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.11), rgba(255,255,255,0.11) 1px, transparent 1px, transparent 9px);
      background-size: 18px 18px;
    }
    body[data-bg='circuit']::before {
      opacity: 0.18;
      background-image:
        radial-gradient(circle at 12px 12px, rgba(255,255,255,0.2) 0 2px, transparent 2.5px),
        radial-gradient(circle at 44px 44px, rgba(255,255,255,0.16) 0 2px, transparent 2.5px),
        linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
      background-size: 56px 56px, 56px 56px, 28px 28px, 28px 28px;
      background-position: 0 0, 14px 14px, 0 0, 0 0;
    }
    body[data-bg='rain']::before {
      opacity: 0.08;
      background-image: linear-gradient(rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      background-size: 100% 100%;
    }
    body[data-bg='rain']::after {
      opacity: 0.45;
      background-image: repeating-linear-gradient(
        100deg,
        transparent 0 10px,
        var(--rain-color) 10px 12px,
        transparent 12px 28px
      );
      background-size: 220px 160px;
      animation: rainFall 1.4s linear infinite;
    }

    .custom-bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s ease;
      overflow: hidden;
    }
    .custom-bg-layer.on { opacity: 1; }
    .custom-bg-media {
      position: absolute;
      inset: 0;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      transform-origin: center;
    }
    .custom-bg-media > img,
    .custom-bg-media > video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform-origin: center;
      pointer-events: none;
    }
    .custom-bg-overlay {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 0.25;
    }

    .app-card {
      width: 95%;
      max-width: 1000px;
      background: var(--panel);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
      border-radius: 40px;
      box-shadow: var(--shadow);
      padding: 50px;
      position: relative;
    }

    /* --- РЁРђРџРљРђ --- */
    .header-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 34px;
      margin-bottom: 50px;
      position: relative;
    }

    .year-label {
      font-size: 24px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      width: 120px;
      min-height: 34px;
      line-height: 1;
      display: flex;
      align-items: center;
      transition: color 0.3s;
    }
    .year-label:hover { color: var(--text); }
    .header-back-icon {
      width: 18px;
      height: 18px;
      display: block;
      stroke: currentColor;
    }

    .month-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -1px;
      cursor: pointer;
      transition: opacity 0.3s;
    }

    .controls-group {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 20px;
      width: 120px;
    }

    /* РўРѕРіР» С‚РµРјС‹ */
    .theme-toggle {
      width: 44px; height: 24px;
      background: rgba(128,128,128,0.1);
      border-radius: 20px;
      position: relative; cursor: pointer;
      border: 1px solid var(--glass-border);
      flex-shrink: 0;
    }
    .toggle-knob {
      width: 16px; height: 16px;
      background: var(--accent);
      border-radius: 50%;
      position: absolute; top: 3px; transform: translateX(23px);
      transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    [data-theme="light"] .toggle-knob { transform: translateX(3px); background: var(--text); }

    /* Р‘СѓСЂРіРµСЂ */
    .burger-menu {
      display: flex; flex-direction: column; gap: 5px;
      cursor: pointer; flex-shrink: 0;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .burger-menu:focus,
    .burger-menu:focus-visible { outline: none; box-shadow: none; }
    .burger-line {
      width: 22px; height: 2px; background: var(--text); border-radius: 2px;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s ease;
    }
    @media (hover: hover) and (pointer: fine) {
      .burger-menu:hover .burger-line:nth-child(2) { transform: translateX(4px); }
    }
    .burger-menu.open .burger-line:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .burger-menu.open .burger-line:nth-child(2) { opacity: 0; transform: translateX(-8px); }
    .burger-menu.open .burger-line:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* --- РљРћРќРўР•Р™РќР•Р  РЎР›РћР•Р’ РЎ Р РђРЎРўР’РћР Р•РќРР•Рњ РљР РђР•Р’ --- */
    .view-container {
      position: relative;
      width: 100%;
      height: calc(var(--day-cell-h) * 6 + var(--day-gap) * 5 + var(--dow-zone));
      overflow: visible;
    }

    /* РЎР»РѕР№ */
    .layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transform: none;
      transition: opacity 0.35s ease;
    }
    .layer.active {
      opacity: 1;
      pointer-events: auto;
      transform: none;
    }

    /* --- РЎР•РўРљР --- */
    .grid-header {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px; margin-bottom: 15px;
    }
    .grid-header span {
      font-size: 11px; text-transform: uppercase; font-weight: 700; color: var(--muted); text-align: center; letter-spacing: 2px;
    }

    .grid-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: var(--day-gap); }
    .grid-months { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; height: 100%; align-content: center; }
    .grid-years { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; height: 100%; align-content: center; }
    #layer-settings { transition: opacity 0.35s ease; }
    #settingsContent {
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 16px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    #settingsContent::-webkit-scrollbar { display: none; width: 0; height: 0; }
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      align-content: start;
      height: 100%;
      overflow: visible;
    }
    .settings-item {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      cursor: pointer;
      position: relative;
      color: var(--text);
      font-weight: 400;
      transition: background 0.3s, transform 0.2s;
      background: transparent;
      border: 0;
      width: 100%;
      min-height: clamp(60px, 14vh, 96px);
      height: clamp(60px, 14vh, 96px);
      padding: 8px 10px;
      flex-direction: column;
      text-align: center;
      gap: 4px;
      user-select: none;
    }
    .settings-item:hover { background: rgba(128,128,128,0.08); }
    .settings-item.on {
      color: var(--current-color);
    }
    .settings-item.on::before {
      content: '';
      position: absolute;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
      opacity: 0.3;
      z-index: 0;
      animation: pulse 3s infinite ease-in-out;
    }
    .settings-item > * { position: relative; z-index: 1; }
    .settings-item-title {
      font-size: clamp(15px, 2.1vh, 18px);
      font-weight: 600;
      color: var(--text);
      line-height: 1;
    }
    .settings-item-value {
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1;
    }
    .settings-subview {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      align-content: start;
      height: 100%;
      overflow-y: auto;
      scrollbar-gutter: stable both-edges;
      padding-right: 2px;
    }
    .settings-subview.matrix-center {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      align-content: flex-start;
      overflow-y: auto;
      padding-right: 0;
      padding-top: 0;
    }
    .settings-subview.matrix-center .settings-sec {
      width: min(980px, 100%);
      height: auto;
    }
    .settings-sec {
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .settings-sec-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.8px; color: var(--muted); }
    .chips { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .chips.matrix-3x3 {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-content: flex-start;
      gap: 10px;
      width: 100%;
    }
    .chips.matrix-3x3 > .chip,
    .chips.matrix-3x3 > .settings-item,
    .chips.matrix-3x3 > .color-chip-card {
      flex: 0 1 calc((100% - 20px) / 3);
      max-width: calc((100% - 20px) / 3);
    }
    .chip {
      display: flex; align-items: center; justify-content: center;
      border-radius: 16px; cursor: pointer; position: relative;
      color: var(--text); font-weight: 400;
      transition: background 0.3s, transform 0.2s;
      border: 0;
      min-height: clamp(60px, 14vh, 96px);
      padding: 8px 10px;
      font-size: clamp(15px, 2.1vh, 18px);
      font-weight: 600;
      background: transparent;
      user-select: none;
      text-align: center;
      flex-direction: column;
      gap: 4px;
    }
    .chip:hover { background: rgba(128,128,128,0.08); }
    .chip.on {
      font-size: clamp(15px, 2.1vh, 18px);
      font-weight: 700;
      color: var(--current-color);
    }
    .chip.on::before {
      content: '';
      position: absolute;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
      opacity: 0.35;
      z-index: 0;
      animation: pulse 3s infinite ease-in-out;
    }
    .chip > * { position: relative; z-index: 1; }
    .color-chip {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--text) 20%, transparent);
      cursor: pointer;
      justify-self: center;
    }
    .color-chip.on { border-color: #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.35) inset; }
    .color-chip-card {
      min-height: clamp(60px, 14vh, 96px);
      height: clamp(60px, 14vh, 96px);
      cursor: pointer;
    }
    .color-chip-dot {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--text) 24%, transparent);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.18);
    }
    .color-chip-card.on .color-chip-dot {
      border-color: #fff;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.28),
        inset 0 0 0 1px rgba(0,0,0,0.24);
    }
    .setting-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .setting-row label { font-size: 13px; color: var(--text); opacity: 0.9; }
    .setting-row input[type='range'] { width: 150px; }
    .setting-row select {
      padding: 6px 10px;
      border-radius: 10px;
      border: 1px solid var(--glass-border);
      background: rgba(128,128,128,0.08);
      color: var(--text);
    }
    .file-input {
      width: 100%;
      border: 1px dashed var(--glass-border);
      border-radius: 12px;
      padding: 10px;
      background: rgba(128,128,128,0.04);
      color: var(--text);
    }
    .chip-label {
      font-size: clamp(15px, 2.1vh, 18px);
      color: var(--text);
      line-height: 1;
      font-weight: 600;
    }
    .chip-sub {
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1;
    }
    .settings-anim-cell { opacity: 1; }
    .settings-single-mobile { grid-template-columns: repeat(3, 1fr); }
    .chips.palette-9 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      width: 100%;
    }
    .shift-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .shift-grid.matrix-3x3 {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      width: 100%;
    }
    .shift-grid.matrix-3x3 > * {
      flex: 0 1 calc((100% - 20px) / 3);
      max-width: calc((100% - 20px) / 3);
    }
    .matrix-placeholder {
      visibility: hidden;
      pointer-events: none;
      min-height: clamp(60px, 14vh, 96px);
      border-radius: 16px;
    }
    .shift-card {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: clamp(60px, 14vh, 96px);
      border-radius: 16px;
      padding: 8px;
      background: transparent;
      transition: background 0.3s, transform 0.2s;
      user-select: none;
    }
    .shift-card:hover { background: rgba(128,128,128,0.08); }
    .shift-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1;
    }
    .shift-value {
      font-size: clamp(15px, 2.1vh, 18px);
      color: var(--text);
      font-weight: 700;
      line-height: 1;
      min-width: 28px;
      text-align: center;
    }
    .shift-btn {
      width: 34px;
      height: 34px;
      border: 0;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .shift-btn:focus,
    .shift-btn:focus-visible { outline: none; box-shadow: none; }
    .shift-btn svg {
      width: 34px;
      height: 34px;
      display: block;
      flex-shrink: 0;
    }
    .shift-btn .btn-ring {
      fill: rgba(128,128,128,0.08);
      stroke: var(--glass-border);
    }
    .shift-btn .btn-mark { stroke: var(--text); }
    .shift-btn:hover .btn-ring { fill: rgba(128,128,128,0.16); }
    .shift-date-value {
      display: block;
      margin-top: 4px;
      font-size: clamp(15px, 2.1vh, 18px);
      color: var(--text);
      font-weight: 600;
      line-height: 1.1;
    }
    .plus-circle {
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-right: 8px;
      vertical-align: middle;
      flex-shrink: 0;
    }
    .plus-circle svg {
      width: 30px;
      height: 30px;
      display: block;
      flex-shrink: 0;
    }
    .plus-circle .plus-ring { stroke: var(--glass-border); }
    .plus-circle .plus-mark { stroke: var(--muted); }
    .settings-item-value.date-value {
      display: inline-flex;
      width: auto;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-transform: none;
      letter-spacing: 0.4px;
      font-size: clamp(15px, 2.1vh, 18px);
      color: var(--text);
      line-height: 1;
      min-height: 34px;
      white-space: nowrap;
    }
    .settings-item-value.date-value .plus-slot {
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .settings-item-value.date-value .plus-slot.is-hidden {
      visibility: hidden;
    }
    .settings-item-value.date-value .plus-circle {
      margin-right: 0;
      align-self: center;
    }
    .settings-item-value.date-value.is-empty {
      color: var(--muted);
    }
    .settings-item-value.date-value .date-text {
      display: inline-block;
      min-width: 0;
      text-align: center;
    }
    #shiftDatePick {
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 0;
      min-height: clamp(60px, 14vh, 96px);
      height: clamp(60px, 14vh, 96px);
    }
    .settings-item-value.preview-weekend {
      color: var(--weekend-color);
      text-transform: none;
      letter-spacing: 0.3px;
      font-size: clamp(13px, 1.9vh, 16px);
    }
    .settings-item-value.preview-workday {
      color: var(--workday-color);
      text-transform: none;
      letter-spacing: 0.3px;
      font-size: clamp(13px, 1.9vh, 16px);
    }

    /* РћР±С‰РёРµ СЃС‚РёР»Рё СЏС‡РµРµРє */
    .cell {
      display: flex; align-items: center; justify-content: center;
      border-radius: 16px; cursor: pointer; position: relative;
      color: var(--text); font-weight: 400;
      transition: background 0.3s, transform 0.2s;
      opacity: 1;
    }
    .cell,
    .settings-item,
    .chip,
    .shift-btn,
    .year-label,
    .month-title {

    .cell.day.workday.dimmed { color: var(--dimmed-text); }
    .cell.day.shift-work.dimmed { color: color-mix(in srgb, var(--workday-color) 35%, transparent); }

    .cell.day.dual-status {

    @keyframes dualDateBounce {

        transform: translate3d(0, 0, 0) scaleY(1);
      }
      8% {
        transform: translate3d(0, -3px, 0) scaleY(1.1);
      }
      16% { /* first touchdown (down hit) */
        transform: translate3d(0, 0.8px, 0) scaleY(0.95);
      }
      28% {
        transform: translate3d(0, -1.5px, 0) scaleY(1.05);
      }
      36% {

    /* РџРѕРґРїРёСЃСЊ РЅРѕРјРµСЂР° РјРµСЃСЏС†Р° (01, 02...) */

    /* Р­С„С„РµРєС‚ РЎРµРіРѕРґРЅСЏ */
    .cell.today { font-size: 28px; font-weight: 700; color: var(--current-color); }
    .cell.today::before {
      content: ''; position: absolute; width: 50px; height: 50px;

    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.2; } 50% { transform: scale(1.3); opacity: 0.5; } }
    @keyframes rainFall { from { transform: translateY(-20%); } to { transform: translateY(20%); } }

    /* РђРЅРёРјР°С†РёРё СЏС‡РµРµРє */
    @keyframes itemPopIn {
      0% { opacity: 0; transform: scale(0.8) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes itemFadeOut {
      0% { opacity: 1; transform: scale(1); }

    /* РЎРґРІРёРі РІР»РµРІРѕ/РІРїСЂР°РІРѕ РїСЂРё РїРµСЂРµР»РёСЃС‚С‹РІР°РЅРёРё РєРѕР»РµСЃРѕРј/СЃРІР°Р№РїРѕРј */
    @keyframes slideNextIn {
      0% { opacity: 0; transform: translateX(50px); }

    @keyframes headerPrevOut { 0% { opacity: 1; translate: 0 0; } 100% { opacity: 0; translate: 18px 0; } }
    @keyframes headerNextIn { 0% { opacity: 0; translate: 18px 0; } 100% { opacity: 1; translate: 0 0; } }

    @keyframes monthTitlePopIn {

    /* --- РћРќР‘РћР Р”РРќР“ (РЎРРќРР™ РџРђР›Р•Р¦/РўРћР§РљРђ) --- */
    .onboarding-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(5px);
      z-index: 100; display: none; align-items: center; justify-content: center;
    }
    .gesture-track {
      width: 80%; max-width: 400px; height: 100px; position: relative;
    }
    .blue-dot {
      position: absolute; top: 50%; left: 0; width: 24px; height: 24px;
      background: #0a84ff; border-radius: 50%; transform: translateY(-50%);
      box-shadow: 0 0 20px #0a84ff;
    }
    /* РҐРІРѕСЃС‚ РєРѕРјРµС‚С‹ СЂРµР°Р»РёР·СѓРµРј С‡РµСЂРµР· РїСЃРµРІРґРѕСЌР»РµРјРµРЅС‚, С€РёСЂРёРЅР° РєРѕС‚РѕСЂРѕРіРѕ РјРµРЅСЏРµС‚СЃСЏ */
    .blue-dot::after {
      content: ''; position: absolute; top: 50%; right: 100%; transform: translateY(-50%);
      height: 8px; width: 0px; background: linear-gradient(to left, #0a84ff, transparent);
      border-radius: 10px; opacity: 0; transition: opacity 0.2s;
    }
    
    /* РђРЅРёРјР°С†РёСЏ: Р’РїСЂР°РІРѕ (Р±С‹СЃС‚СЂРѕ) -> Р’РїСЂР°РІРѕ (РјРµРґР»РµРЅРЅРѕ) -> Р’Р»РµРІРѕ (Р±С‹СЃС‚СЂРѕ) -> Р’Р»РµРІРѕ (РјРµРґР»РµРЅРЅРѕ) */
    .animate-gesture .blue-dot {
      animation: swipeGesture 4s ease-in-out 2; /* 2 РїРѕРІС‚РѕСЂРµРЅРёСЏ */
    }
    .animate-gesture .blue-dot::after {
      animation: tailGesture 4s ease-in-out 2;
    }

    @keyframes swipeGesture {
      0% { left: 0%; }
      15% { left: 50%; } /* РЈСЃРєРѕСЂРµРЅРЅРѕ РґРѕ СЃРµСЂРµРґРёРЅС‹ */
      50% { left: 100%; } /* Р‘РµР· РєРѕРјРµС‚С‹ РґРѕ РєСЂР°СЏ */
      65% { left: 50%; } /* РЈСЃРєРѕСЂРµРЅРЅРѕ РѕР±СЂР°С‚РЅРѕ РґРѕ СЃРµСЂРµРґРёРЅС‹ */
      100% { left: 0%; } /* РћР±СЂР°С‚РЅРѕ РІ РЅР°С‡Р°Р»Рѕ */
    }
    @keyframes tailGesture {
      0% { width: 0; opacity: 0; }
      7% { width: 60px; opacity: 0.8; } /* Р Р°Р·РіРѕРЅ РІРїСЂР°РІРѕ */
      15% { width: 0px; opacity: 0; }
      50% { width: 0; opacity: 0; right: auto; left: 100%; background: linear-gradient(to right, #0a84ff, transparent); }
      57% { width: 60px; opacity: 0.8; } /* Р Р°Р·РіРѕРЅ РІР»РµРІРѕ */
      65% { width: 0px; opacity: 0; }
      100% { width: 0; opacity: 0; right: 100%; left: auto; background: linear-gradient(to left, #0a84ff, transparent); }
    }

    /* --- РђР”РђРџРўРР’ Р”Р›РЇ РњРћР‘РР›РћРљ --- */
    @media (max-width: 600px) {

      .month-title {
        font-size: 20px;
        position: static;
        left: auto;
        transform: none !important;
        translate: 0 0 !important;

      .controls-group { width: 72px; gap: 12px; }

      /* РџРµСЂРµСЃС‚СЂРѕРµРЅРёРµ СЃРµС‚РѕРє РґР»СЏ РјРѕР±РёР»РѕРє */
      .grid-months { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .cell.month {

      .grid-years { grid-template-columns: repeat(3, 1fr); gap: 8px; } /* 3x5 */

    }


    @media (max-width: 420px) {
      .shift-card { gap: 4px; }

    @media (max-width: 520px) {

    @media (max-width: 360px) {

  </style>

<body>

  <div class="custom-bg-layer" id="customBgLayer" aria-hidden="true">
    <div class="custom-bg-media" id="customBgMedia"></div>
    <div class="custom-bg-overlay" id="customBgOverlay"></div>
  </div>

  <div class="onboarding-overlay" id="onboarding">
    <div class="gesture-track">
      <div class="blue-dot"></div>
    </div>
  </div>

  <div class="app-card">
    <div class="header-controls">
      <div class="year-label" id="yearBtn">2024</div>
      <div class="month-title" id="monthBtn">Март</div>
      
      <div class="controls-group">
        <div class="burger-menu" id="burgerMenu" role="button" tabindex="0" aria-label="Открыть настройки">
          <div class="burger-line"></div>
          <div class="burger-line"></div>
          <div class="burger-line"></div>
        </div>
      </div>
    </div>

    <div class="view-container" id="viewContainer">
      <div class="layer active" id="layer-days">
        <div class="grid-header" id="dowHeader"></div>
        <div class="grid-days" id="grid-days"></div>
      </div>

      <div class="layer" id="layer-months">
        <div class="grid-months" id="grid-months"></div>
      </div>

      <div class="layer" id="layer-years">
        <div class="grid-years" id="grid-years"></div>
      </div>

      <div class="layer" id="layer-settings">
        <div id="settingsContent"></div>
      </div>
    </div>
  </div>

  <script>
    const monthFormatter = new Intl.DateTimeFormat('ru-RU', { month: 'long' });
    const today = new Date();
    const systemThemeMedia = window.matchMedia('(prefers-color-scheme: dark)');
    const state = {
      currentView: 'days',
      settingsPage: 'root',
      displayYear: today.getFullYear(),
      displayMonth: today.getMonth(),
      selectedDay: today.getDate(),
      shiftDatePickMode: false,
    };
    let isAnimating = false;
    const dayLabels = [
      { id: 1, name: 'Пн' }, { id: 2, name: 'Вт' }, { id: 3, name: 'Ср' },
      { id: 4, name: 'Чт' }, { id: 5, name: 'Пт' }, { id: 6, name: 'Сб' }, { id: 0, name: 'Вс' },
    ];
    const accentPalette = ['#ff0000', '#ff7f00', '#ffd400', '#00a651', '#00c8ff', '#0057ff', '#6f2cff', '#ff00b7', '#ffffff'];
    const settingsDefault = {
      themeMode: 'system',
      weekStart: 1,
      weekends: [6, 0],
      animationSpeed: 'normal',
      accents: {
        weekend: '#ff5f8a',
        current: '#8b5cf6',
        workday: '#ffffff',
      },
      shift: {
        onDays: 0,
        offDays: 0,
        startDate: '',
      },
      data: {
        syncProvider: 'none',
      },
      background: {
        mode: 'none',
        customType: '',
        customData: '',
        position: 'center',
        fill: 'cover',
        scale: 100,
        angle: 0,
        darken: 25,
        parallax: false,
        sound: false,
        volume: 0,
      },
    };
    let settings = loadSettings();
    let accentTarget = 'current';
    let runtimeCustomUrl = '';
    let parallaxOffset = { x: 0, y: 0 };
    let bgApplyRaf = 0;
    let bgSaveTimer = 0;
    const BACK_ICON_SVG = '<svg class="header-back-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M15 5L8 12L15 19" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    function resolveThemeFromMode(mode) {
      if (mode === 'dark' || mode === 'light') return mode;
      return systemThemeMedia.matches ? 'dark' : 'light';
    }

    function applyThemeMode(mode) {
      const body = document.body;
      body.setAttribute('data-theme', resolveThemeFromMode(mode));
    }

    function getStoredThemeMode() {
      return settings.themeMode || 'system';
    }

    const onSystemThemeChange = () => {
      if (getStoredThemeMode() === 'system') {
        applyThemeMode('system');
      }
    };
    if (typeof systemThemeMedia.addEventListener === 'function') {
      systemThemeMedia.addEventListener('change', onSystemThemeChange);
    } else if (typeof systemThemeMedia.addListener === 'function') {
      systemThemeMedia.addListener(onSystemThemeChange);
    }

    function deepMerge(base, incoming) {
      const result = Array.isArray(base) ? [...base] : { ...base };
      Object.keys(incoming || {}).forEach((key) => {
        const value = incoming[key];
        if (value && typeof value === 'object' && !Array.isArray(value) && base[key] && typeof base[key] === 'object' && !Array.isArray(base[key])) {
          result[key] = deepMerge(base[key], value);
        } else {
          result[key] = value;
        }
      });
      return result;
    }

    function loadSettings() {
      try {
        const raw = localStorage.getItem('calendarSettings');
        if (!raw) return JSON.parse(JSON.stringify(settingsDefault));
        const parsed = JSON.parse(raw);
        const merged = deepMerge(JSON.parse(JSON.stringify(settingsDefault)), parsed);
        if (merged.background?.mode === 'paper') merged.background.mode = 'none';
        return merged;
      } catch {
        return JSON.parse(JSON.stringify(settingsDefault));
      }
    }

    function scheduleSaveSettings(delay = 120) {
      if (bgSaveTimer) clearTimeout(bgSaveTimer);
      bgSaveTimer = setTimeout(() => {
        bgSaveTimer = 0;
        saveSettings();
      }, delay);
    }

    function scheduleBackgroundApply() {
      if (bgApplyRaf) return;
      bgApplyRaf = requestAnimationFrame(() => {
        bgApplyRaf = 0;
        applySettingsToDOM();
      });
    }

    function saveSettings() {
      try {
        localStorage.setItem('calendarSettings', JSON.stringify(settings));
      } catch {
        // Ignore quota errors for very large custom media.
      }
    }

    function getAnimationFactor() {
      if (settings.animationSpeed === 'none') return 0;
      if (settings.animationSpeed === 'slow') return 1.35;
      if (settings.animationSpeed === 'fast') return 0.72;
      return 1;
    }

    function composeBgTransform() {
      const bg = settings.background;
      const scale = (Number(bg.scale) || 100) / 100;
      const angle = Number(bg.angle) || 0;
      return `translate(${parallaxOffset.x}px, ${parallaxOffset.y}px) scale(${scale}) rotate(${angle}deg)`;
    }

    function applyAnimationModeToDOM() {
      document.body.classList.toggle('anim-none', settings.animationSpeed === 'none');
    }

    function applyCustomBackground() {
      const layer = document.getElementById('customBgLayer');
      const media = document.getElementById('customBgMedia');
      const overlay = document.getElementById('customBgOverlay');
      const bg = settings.background;
      const isCustom = bg.mode === 'custom' && (bg.customData || runtimeCustomUrl);
      layer.classList.toggle('on', Boolean(isCustom));
      overlay.style.opacity = String((Number(bg.darken) || 0) / 100);
      media.style.transform = composeBgTransform();
      media.style.backgroundPosition = bg.position || 'center';

      if (!isCustom) {
        media.innerHTML = '';
        media.style.backgroundImage = 'none';
        return;
      }

      const src = runtimeCustomUrl || bg.customData;
      const type = bg.customType || '';
      const fill = bg.fill || 'cover';
      const isRepeat = fill === 'repeat';

      if (isRepeat && type !== 'video') {
        if (media.querySelector('video, img')) media.innerHTML = '';
        media.style.backgroundImage = `url("${src}")`;
        media.style.backgroundRepeat = 'repeat';
        media.style.backgroundSize = 'auto';
        return;
      }

      media.style.backgroundImage = 'none';
      media.style.backgroundRepeat = 'no-repeat';
      media.style.backgroundSize = 'cover';

      if (type === 'video') {
        let video = media.querySelector('#customBgVideo');
        if (!video || video.dataset.src !== src) {
          media.innerHTML = `<video id="customBgVideo" autoplay loop playsinline ${bg.sound ? '' : 'muted'}><source src="${src}"></video>`;
          video = media.querySelector('#customBgVideo');
          if (video) video.dataset.src = src;
        }
        if (video) {
          video.style.objectFit = fill === 'contain' ? 'contain' : fill === 'fill' ? 'fill' : 'cover';
          video.style.objectPosition = bg.position || 'center';
          video.muted = !bg.sound;
          video.volume = bg.sound ? Math.max(0, Math.min(1, (Number(bg.volume) || 0) / 100)) : 0;
        }
      } else {
        let img = media.querySelector('img');
        if (!img || img.dataset.src !== src) {
          media.innerHTML = `<img src="${src}" alt="" />`;
          img = media.querySelector('img');
          if (img) img.dataset.src = src;
        }
        if (img) {
          img.style.objectFit = fill === 'contain' ? 'contain' : fill === 'fill' ? 'fill' : 'cover';
          img.style.objectPosition = bg.position || 'center';
        }
      }
    }

    function applySettingsToDOM() {
      applyThemeMode(settings.themeMode || 'system');
      document.body.setAttribute('data-bg', settings.background.mode || 'none');
      document.documentElement.style.setProperty('--accent', settings.accents.current);
      document.documentElement.style.setProperty('--current-color', settings.accents.current);
      document.documentElement.style.setProperty('--weekend-color', settings.accents.weekend);
      document.documentElement.style.setProperty('--workday-color', settings.accents.workday);
      applyAnimationModeToDOM();
      applyCustomBackground();
      renderDOWHeader();
    }

    function settingsPageTitle() {
      const accentLabel = accentTarget === 'weekend' ? 'Выходные' : accentTarget === 'workday' ? 'Рабочие' : 'Текущий';
      const map = {
        root: 'Настройки',
        data: 'Данные',
        dataSync: 'Синхронизация',
        theme: 'Тема',
        accents: 'Цвета',
        accentColors: `Цвета: ${accentLabel}`,
        background: 'Фон',
        backgroundCustom: 'Свой фон',
        weekStart: 'Начало недели',
        weekends: 'Выходные',
        shift: 'График',
        animation: 'Анимация',
      };
      return map[state.settingsPage] || 'Настройки';
    }

    function getSettingsBackTarget() {
      if (state.settingsPage === 'accentColors') return 'accents';
      if (state.settingsPage === 'dataSync') return 'data';
      if (state.settingsPage === 'backgroundCustom') return 'background';
      return 'root';
    }

    function animateSettingsItems(container, animName, duration, step, reverse = false) {
      const items = Array.from(container.querySelectorAll('.settings-anim-cell'));
      items.forEach((el, i) => {
        const orderIndex = reverse ? (items.length - 1 - i) : i;
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = `${animName} ${duration}ms cubic-bezier(0.16, 1, 0.3, 1) both ${orderIndex * step}ms`;
      });
      if (!items.length) return 0;
      return duration + (items.length - 1) * step;
    }

    function transitionSettingsPage(targetPage, direction = 'next') {
      if (isAnimating || state.settingsPage === targetPage) return;
      const factor = getAnimationFactor();
      if (factor === 0) {
        state.settingsPage = targetPage;
        renderSettings();
        syncHeader();
        return;
      }
      const root = document.getElementById('settingsContent');
      if (!root) return;
      isAnimating = true;
      animateSettingsHeader(direction, 'out');
      const outName = direction === 'next' ? 'slideNextOut' : 'slidePrevOut';
      const outDuration = Math.round(260 * factor);
      const step = Math.round(15 * factor);
      const outTotal = animateSettingsItems(root, outName, outDuration, step);
      setTimeout(() => {
        state.settingsPage = targetPage;
        renderSettings(direction === 'next' ? 'slideNextIn' : 'slidePrevIn');
        syncHeader();
        animateSettingsHeader(direction, 'in');
        setTimeout(() => {
          isAnimating = false;
        }, Math.round(420 * factor));
      }, outTotal || outDuration);
    }

    function renderDOWHeader() {
      const header = document.getElementById('dowHeader');
      if (!header) return;
      const labels = [];
      for (let i = 0; i < 7; i++) {
        const js = (settings.weekStart + i) % 7;
        labels.push(dayLabels.find((d) => d.id === js)?.name || '');
      }
      header.innerHTML = labels.map((name) => `<span>${name}</span>`).join('');
    }

    function formatShortDate(iso) {
      if (!iso) return '';
      const d = new Date(`${iso}T00:00:00`);
      if (Number.isNaN(d.getTime())) return '';
      return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function toLocalIsoDate(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, '0');
      const d = String(dateObj.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function getAccentPreview(kind) {
      const cells = getDayCellsData(state.displayYear, state.displayMonth).filter((c) => c.monthShift === 0);
      const picked = [];
      const hasShiftConfig = settings.shift.onDays > 0 && settings.shift.offDays > 0 && Boolean(settings.shift.startDate);
      if (kind === 'workday' && !hasShiftConfig) return '-';
      for (let i = 0; i < cells.length; i++) {
        const c = cells[i];
        const isWeekend = c.className.includes('weekend');
        const isShiftWork = c.className.includes('shift-work');
        if ((kind === 'weekend' && isWeekend) || (kind === 'workday' && isShiftWork)) {
          picked.push(String(c.value));
        }
        if (picked.length >= 3) break;
      }
      return picked.join(' ') || '-';
    }

          const el = document.createElement('div');

      } else if (state.settingsPage === 'data') {

        const dataItems = [

    function openSettings(page = 'root') {
      if (isAnimating) return;
      state.shiftDatePickMode = false;
      const factor = getAnimationFactor();
      if (factor === 0) {
        state.settingsPage = page;
        activateLayer('settings', 'itemPopIn');
        setBurgerOpen(true);
        return;
      }
      isAnimating = true;
      state.settingsPage = page;
      activateLayer('settings', 'itemPopIn');
      setBurgerOpen(true);
      animateSettingsHeaderInByMenuPop();
      setTimeout(() => { isAnimating = false; }, Math.round(320 * factor));

    function closeSettings() {
      const burger = document.getElementById('burgerMenu');
      if (burger) {
        burger.classList.remove('open');
        burger.blur();
      }
      if (state.currentView !== 'settings') return;
      if (isAnimating) return;
      state.shiftDatePickMode = false;
      const factor = getAnimationFactor();
      if (factor === 0) {
        activateLayer('days', 'itemPopIn');
        setBurgerOpen(false);
      } else {
        isAnimating = true;
        const settingsRoot = document.getElementById('settingsContent');
        const outDuration = Math.round(240 * factor);
        const outStep = Math.round(15 * factor);
        const outTotal = settingsRoot
          ? animateSettingsItems(settingsRoot, 'itemFadeOut', outDuration, outStep, true)
          : outDuration;
        animateSettingsHeaderOutByMenuFade();
        setTimeout(() => {
          activateLayer('days', 'itemPopIn');
          animateDayHeaderInByMenuPop();
          setBurgerOpen(false);
          setTimeout(() => { isAnimating = false; }, Math.round(320 * factor));
        }, outTotal || Math.round(220 * factor));
      }
      // Safety reset for mobile/touch where state can visually stick during transition.
      setTimeout(() => {
        const b = document.getElementById('burgerMenu');
        if (!b) return;
        b.classList.remove('open');
        b.blur();
      }, 0);
      setTimeout(() => {
        const b = document.getElementById('burgerMenu');
        if (!b) return;
        b.classList.remove('open');

          mediaEl.style.transform = composeBgTransform();
        }
        return;
      }
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      parallaxOffset = {

    function isShiftWorkDay(dateObj) {
      const sh = settings.shift;
      if (!sh || !sh.onDays || !sh.offDays || !sh.startDate) return false;
      const start = new Date(`${sh.startDate}T00:00:00`);
      if (Number.isNaN(start.getTime())) return false;
      const current = new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
      const diffDays = Math.floor((current - start) / 86400000);
      const cycle = sh.onDays + sh.offDays;
      if (cycle <= 0) return false;
      const cycleIndex = ((diffDays % cycle) + cycle) % cycle;
      return cycleIndex < sh.onDays;
    }

    function getDayCellsData(year, month) {
      const firstWeekDay = (new Date(year, month, 1).getDay() - settings.weekStart + 7) % 7;
      const daysInMonth = getDaysInMonth(year, month);
      const prevMonthDays = getDaysInMonth(year, month - 1);
      const cells = [];

      for (let i = 0; i < 42; i++) {
        const dayNumber = i - firstWeekDay + 1;
        let monthShift = 0;
        let value = dayNumber;
        if (dayNumber <= 0) {
          monthShift = -1;
          value = prevMonthDays + dayNumber;
        } else if (dayNumber > daysInMonth) {
          monthShift = 1;
          value = dayNumber - daysInMonth;
        }

        const targetDate = new Date(year, month + monthShift, value);
        const isToday =
          targetDate.getFullYear() === today.getFullYear() &&
          targetDate.getMonth() === today.getMonth() &&
          targetDate.getDate() === today.getDate();
        const classes = ['cell', 'day'];
        if (monthShift !== 0) classes.push('dimmed');
        if (isToday) classes.push('today');
        const col = i % 7;
        const jsDay = (settings.weekStart + col) % 7;
        if (settings.weekends.includes(jsDay)) classes.push('weekend');
        else classes.push('workday');
        const isShiftWork = isShiftWorkDay(targetDate);
        if (isShiftWork) classes.push('shift-work');
        if (isShiftWork && settings.weekends.includes(jsDay)) classes.push('dual-status');
        cells.push({ value, monthShift, className: classes.join(' ') });
      }

      return cells;
    }

    function getMonthCellsData(year) {
      const cells = [];
      for (let i = 0; i < 12; i++) {
        const num = String(i + 1).padStart(2, '0');
        const classes = ['cell', 'month'];
        if (year === today.getFullYear() && i === today.getMonth()) classes.push('today');
        cells.push({
          monthIndex: i,
          className: classes.join(' '),
          label: getMonthName(i),
          sub: num,
        });
      }
      return cells;
    }

    function getYearCellsData(centerYear) {
      const cells = [];
      const count = getYearGridCount();
      const startYear = centerYear - Math.floor(count / 2);
      for (let i = 0; i < count; i++) {
        const year = startYear + i;
        const classes = ['cell', 'year'];
        if (year === today.getFullYear()) classes.push('today');
        cells.push({ year, className: classes.join(' ') });
      }
      return cells;
    }

    const dualTimers = [];
    function clearDualTimers() {
      dualTimers.forEach(({ type, id }) => type === 'interval' ? clearInterval(id) : clearTimeout(id));
      dualTimers.length = 0;
    }

    function applyDualStatusSequence(grid, alreadyVisible = false) {
      clearDualTimers();
      const cells = Array.from(grid.querySelectorAll('.cell.day.dual-status'));
      if (!cells.length) return;

      const stepMs = 260;
      const cycleMs = Math.max(2200, 1200 + (cells.length * stepMs));
      const touchdownMs = Math.round(cycleMs * 0.16);

      cells.forEach((cell, index) => {
        const el = cell.querySelector('.day-number');
        if (!el) return;

        const popInFinish = alreadyVisible ? 0 : (500 + (index * 15) + 40);
        const bounceDelay = popInFinish + (index * stepMs);

        el.style.setProperty('--dual-delay', `${bounceDelay}ms`);
        el.style.setProperty('--dual-cycle', `${cycleMs}ms`);
        el.classList.remove('dual-switched');

        // Fire at the START of each cycle (every cycleMs, beginning at bounceDelay).
        // Inside each tick schedule the color flip at +touchdownMs (= 16% into cycle).
        const t0 = setTimeout(() => {
          const scheduleFlip = () => {
            const t = setTimeout(() => {
              if (!el.isConnected) return;
              el.classList.toggle('dual-switched');
            }, touchdownMs);
            dualTimers.push({ type: 'timeout', id: t });
          };

          scheduleFlip(); // cycle 1 touchdown

          const iv = setInterval(() => {
            if (!el.isConnected) { clearInterval(iv); return; }
            scheduleFlip(); // every subsequent cycle's touchdown
          }, cycleMs);
          dualTimers.push({ type: 'interval', id: iv });

        }, bounceDelay);
        dualTimers.push({ type: 'timeout', id: t0 });
      });
    }

    function selectMonth(monthIndex) {
      if (isAnimating) return;
      const prevMonth = state.displayMonth;
      const monthChanged = monthIndex !== prevMonth;
      const direction = monthIndex > prevMonth ? 'next' : 'prev';
      const changes = { yearChanged: false, monthChanged };
      const factor = getAnimationFactor();

      if (!monthChanged) {
        activateLayer('days', 'itemPopIn');
        return;
      }
      if (factor === 0) {
        state.displayMonth = monthIndex;
        state.selectedDay = Math.min(state.selectedDay, getDaysInMonth(state.displayYear, monthIndex));
        activateLayer('days', 'itemPopIn');
        return;
      }

      isAnimating = true;
      animateHeader(direction, 'out', changes);
      setTimeout(() => {
        state.displayMonth = monthIndex;
        state.selectedDay = Math.min(state.selectedDay, getDaysInMonth(state.displayYear, monthIndex));
        activateLayer('days', 'itemPopIn');
        animateHeader(direction, 'in', changes);
        setTimeout(() => {
          isAnimating = false;
        }, Math.round(300 * factor));
      }, Math.round(220 * factor));
    }

    function renderMonths(animName) {

    function selectYear(year) {

      const prevYear = state.displayYear;
      const yearChanged = year !== prevYear;
      const direction = year > prevYear ? 'next' : 'prev';
      const changes = { yearChanged, monthChanged: false };
      const factor = getAnimationFactor();

      if (!yearChanged) {
        activateLayer('months', 'itemPopIn');
        return;
      }
      if (factor === 0) {
        state.displayYear = year;
        state.selectedDay = Math.min(state.selectedDay, getDaysInMonth(state.displayYear, state.displayMonth));
        activateLayer('months', 'itemPopIn');
        return;
      }

      isAnimating = true;
      animateHeader(direction, 'out', changes);
      setTimeout(() => {
        state.displayYear = year;
        state.selectedDay = Math.min(state.selectedDay, getDaysInMonth(state.displayYear, state.displayMonth));
        activateLayer('months', 'itemPopIn');
        animateHeader(direction, 'in', changes);

          isAnimating = false;

    function renderYears(animName) {
      const grid = document.getElementById('grid-years');
      const cellsData = getYearCellsData(state.displayYear);
      grid.innerHTML = cellsData
        .map((item) => `<div class="${item.className}" data-year="${item.year}">${item.year}</div>`)
        .join('');

    function applyStaggerAnimation(grid, animName) {
      const validAnimations = new Set(['itemPopIn', 'slideNextIn', 'slidePrevIn', 'itemFadeOut', 'none']);
      const animation = validAnimations.has(animName) ? animName : 'itemPopIn';
      if (animation === 'none') {
        const cellsNone = grid.querySelectorAll('.cell');
        cellsNone.forEach((cell) => {
          cell.style.animation = 'none';
          cell.style.opacity = '1';
        });
        return;
      }
      const factor = getAnimationFactor();
      const cells = grid.querySelectorAll('.cell');
      if (factor === 0) {
        cells.forEach((cell) => {
          cell.style.animation = 'none';
          cell.style.opacity = '1';
        });
        return;
      }
      cells.forEach((cell, i) => {
        const delay = i * Math.round(15 * factor);
        cell.style.animation = 'none';
        cell.offsetHeight;
        const duration = Math.round(500 * factor);
        cell.style.animation = `${animation} ${duration}ms cubic-bezier(0.16, 1, 0.3, 1) both ${delay}ms`;
      });
    }

    function getActiveGrid() {
      const activeLayer = document.getElementById(`layer-${state.currentView}`);
      if (!activeLayer) return null;
      return activeLayer.querySelector('.grid-days, .grid-months, .grid-years');
    }

    function animateCurrentGridOut(direction) {
      const grid = getActiveGrid();
      if (!grid) return 0;
      const cells = grid.querySelectorAll('.cell');
      const duration = 320;
      const step = 15;
      const outAnimation = direction === 'next' ? 'slideNextOut' : 'slidePrevOut';
      cells.forEach((cell, i) => {
        cell.style.animation = 'none';
        cell.offsetHeight;
        cell.style.animation = `${outAnimation} ${duration}ms cubic-bezier(0.16, 1, 0.3, 1) both ${i * step}ms`;
      });
      return duration + Math.max(0, cells.length - 1) * step;
    }

    function animateHeader(direction, phase, changes) {
      const factor = getAnimationFactor();
      if (factor === 0) return;
      const targets = [];
      if (changes.yearChanged) targets.push(document.getElementById('yearBtn'));
      if (changes.monthChanged) targets.push(document.getElementById('monthBtn'));
      if (!targets.length) return;

      const isNext = direction === 'next';
      const animName = phase === 'out'
        ? (isNext ? 'headerNextOut' : 'headerPrevOut')
        : (isNext ? 'headerNextIn' : 'headerPrevIn');

      targets.forEach((el) => {
        if (!el) return;
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = `${animName} ${Math.round(260 * factor)}ms cubic-bezier(0.16, 1, 0.3, 1) both`;
      });
    }

    function navigateContent(direction) {
      if (state.currentView === 'settings') return;
      if (isAnimating) return;
      isAnimating = true;

      const delta = direction === 'next' ? 1 : -1;
      const prevYear = state.displayYear;
      const prevMonth = state.displayMonth;
      let nextYear = prevYear;
      let nextMonth = prevMonth;
      let nextSelectedDay = state.selectedDay;

      if (state.currentView === 'days') {
        const nextMonthDate = new Date(prevYear, prevMonth + delta, 1);
        nextYear = nextMonthDate.getFullYear();
        nextMonth = nextMonthDate.getMonth();
        nextSelectedDay = Math.min(state.selectedDay, getDaysInMonth(nextYear, nextMonth));
      } else if (state.currentView === 'months') {
        nextYear = prevYear + delta;
      } else if (state.currentView === 'years') {
        nextYear = prevYear + delta * getYearGridCount();
      }

      const changes = {
        yearChanged: nextYear !== prevYear,
        monthChanged: nextMonth !== prevMonth,
      };

      if (state.currentView === 'days' || state.currentView === 'months' || state.currentView === 'years') {
        transitionGridByRows(state.currentView, direction, nextYear, nextMonth, nextSelectedDay, changes);
        return;
      }

      animateHeader(direction, 'out', changes);
      const outDuration = animateCurrentGridOut(direction);
      setTimeout(() => {
        state.displayYear = nextYear;
        state.displayMonth = nextMonth;
        state.selectedDay = nextSelectedDay;

        renderCurrent(delta > 0 ? 'slideNextIn' : 'slidePrevIn');
        animateHeader(direction, 'in', changes);
        setTimeout(() => {
          isAnimating = false;
        }, 360);
      }, outDuration);
    }

    function transitionGridByRows(view, direction, nextYear, nextMonth, nextSelectedDay, changes) {
      const factor = getAnimationFactor();
      if (factor === 0) {
        state.displayYear = nextYear;
        state.displayMonth = nextMonth;
        state.selectedDay = nextSelectedDay;
        renderCurrent('itemPopIn');
        isAnimating = false;
        return;
      }
      const gridId = view === 'days' ? 'grid-days' : view === 'months' ? 'grid-months' : 'grid-years';
      const className = view === 'days' ? '.cell.day' : view === 'months' ? '.cell.month' : '.cell.year';
      const cols = view === 'days' ? 7 : window.innerWidth <= 600 ? 3 : view === 'months' ? 4 : 7;
      const expectedCount = view === 'days' ? 42 : view === 'months' ? 12 : getYearGridCount();
      const grid = document.getElementById(gridId);
      const currentCells = Array.from(grid.querySelectorAll(className));
      if (currentCells.length !== expectedCount) {
        state.displayYear = nextYear;
        state.displayMonth = nextMonth;
        state.selectedDay = nextSelectedDay;
        renderCurrent(direction === 'next' ? 'slideNextIn' : 'slidePrevIn');
        animateHeader(direction, 'in', changes);
        isAnimating = false;
        return;
      }

      const nextCellsData = view === 'days'
        ? getDayCellsData(nextYear, nextMonth)
        : view === 'months'
          ? getMonthCellsData(nextYear)
          : getYearCellsData(nextYear);
      const outAnimation = direction === 'next' ? 'slideNextOut' : 'slidePrevOut';
      const inAnimation = direction === 'next' ? 'slideNextIn' : 'slidePrevIn';
      const rowCount = Math.ceil(expectedCount / cols);
      const rowDuration = Math.round(300 * factor);
      const inDuration = Math.round(300 * factor);
      const rowStep = Math.round(120 * factor);
      const cellStep = Math.round(15 * factor);

      animateHeader(direction, 'out', changes);

      setTimeout(() => {
        state.displayYear = nextYear;
        state.displayMonth = nextMonth;
        state.selectedDay = nextSelectedDay;
        syncHeader();
        animateHeader(direction, 'in', changes);
      }, rowDuration);

      for (let row = 0; row < rowCount; row++) {
        const rowStart = row * cols;
        const rowCells = currentCells.slice(rowStart, rowStart + cols);

        setTimeout(() => {
          rowCells.forEach((cell, col) => {
            cell.style.animation = 'none';
            cell.offsetHeight;
            cell.style.animation = `${outAnimation} ${rowDuration}ms cubic-bezier(0.16, 1, 0.3, 1) both ${col * cellStep}ms`;
            // Start "in" immediately after this cell's own "out" ends.
            setTimeout(() => {
              const nextCell = nextCellsData[rowStart + col];
              if (!nextCell) return;
              cell.className = nextCell.className;
              if (view === 'days') {
                cell.dataset.day = String(nextCell.value);
                cell.dataset.shift = String(nextCell.monthShift);
                cell.innerHTML = getDayCellContent(nextCell);
              } else if (view === 'months') {
                cell.dataset.month = String(nextCell.monthIndex);
                cell.innerHTML = `<span>${nextCell.label}</span><span class="month-sub">${nextCell.sub}</span>`;
              } else {
                cell.dataset.year = String(nextCell.year);
                cell.textContent = String(nextCell.year);
              }
              cell.style.animation = 'none';
              cell.offsetHeight;
              cell.style.animation = `${inAnimation} ${inDuration}ms cubic-bezier(0.16, 1, 0.3, 1) both`;
            }, rowDuration + col * cellStep);
          });
        }, row * rowStep);
      }

      const rowTail = rowDuration + (cols - 1) * cellStep + inDuration;
      const totalDuration = (rowCount - 1) * rowStep + rowTail + 80;
      setTimeout(() => {
        if (view === 'days') bindDayCellClicks(grid);
        if (view === 'days') applyDualStatusSequence(grid, true);
        if (view === 'months') bindMonthCellClicks(grid);
        if (view === 'years') bindYearCellClicks(grid);
        isAnimating = false;
      }, totalDuration);
    }

    const viewContainer = document.getElementById('viewContainer');
    viewContainer.addEventListener('wheel', (e) => {
      if (Math.abs(e.deltaY) > 30) {
        navigateContent(e.deltaY > 0 ? 'next' : 'prev');
      }
    }, { passive: true });

    let touchStartX = 0;
    viewContainer.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });
    viewContainer.addEventListener('touchend', (e) => {
      const touchEndX = e.changedTouches[0].screenX;
      const diff = touchStartX - touchEndX;
      if (diff > 50) navigateContent('next');
      if (diff < -50) navigateContent('prev');
    }, { passive: true });

    window.addEventListener('resize', () => {
      if (state.currentView === 'years') renderYears('itemPopIn');
    });
  </script>
</body>
</html>
